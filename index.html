<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TGL_SCRIPTER Key System</title>
<style>
  :root{
    --blood: #ff2c3c;
    --ember: #ff7a1a;
    --blood-dim: #8c0f18;
    --ink: #ffe9e5;
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0; height:100%; overflow:hidden;
    background:#050203;
    font-family:'Segoe UI', sans-serif;
    color: var(--ink);
  }

  #space{
    position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(circle at 15% 20%, rgba(180,20,30,0.35), transparent 45%),
      radial-gradient(circle at 85% 25%, rgba(255,120,20,0.16), transparent 45%),
      radial-gradient(circle at 50% 85%, rgba(120,0,10,0.35), transparent 50%),
      linear-gradient(160deg, #0a0303 0%, #150404 45%, #060202 100%);
    background-size: 200% 200%;
    animation: bgShift 22s ease-in-out infinite;
  }
  @keyframes bgShift{
    0%{ background-position: 0% 0%; }
    50%{ background-position: 100% 60%; }
    100%{ background-position: 0% 0%; }
  }

  canvas#stars{ position:fixed; inset:0; z-index:1; }

  .orb{
    position:fixed; border-radius:50%; z-index:1;
    filter: blur(2px);
    animation: orbFloat linear infinite;
    mix-blend-mode: screen;
  }
  .orb.o1{
    width:260px; height:260px; top:-6%; left:-8%;
    background: radial-gradient(circle, rgba(220,20,30,0.45), transparent 70%);
    animation-duration: 26s;
  }
  .orb.o2{
    width:220px; height:220px; bottom:-8%; right:-6%;
    background: radial-gradient(circle, rgba(255,122,26,0.30), transparent 70%);
    animation-duration: 34s;
    animation-direction: reverse;
  }
  .orb.o3{
    width:180px; height:180px; top:55%; left:60%;
    background: radial-gradient(circle, rgba(140,0,20,0.40), transparent 70%);
    animation-duration: 20s;
  }
  @keyframes orbFloat{
    0%{ transform: translate(0,0) scale(1); }
    50%{ transform: translate(30px,-25px) scale(1.08); }
    100%{ transform: translate(0,0) scale(1); }
  }

  .wrap{
    position:relative; z-index:5;
    height:100vh; display:flex; align-items:center; justify-content:center;
  }
  .card{
    position:relative;
    width:min(90vw, 380px);
    background: linear-gradient(180deg, rgba(20,6,7,0.75), rgba(10,3,4,0.75));
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius:6px;
    border:1px solid rgba(255,44,60,0.45);
    box-shadow: 0 0 50px rgba(255,44,60,0.18), 0 20px 60px rgba(0,0,0,0.6), inset 0 0 30px rgba(255,44,60,0.05);
    padding:34px 28px;
    text-align:center;
    clip-path: polygon(14px 0, 100% 0, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0 100%, 0 14px);
  }
  .card::before{
    content:'';
    position:absolute; inset:0;
    border-radius:6px;
    padding:1px;
    background: linear-gradient(135deg, rgba(255,122,26,0.6), transparent 40%, rgba(255,44,60,0.6));
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events:none;
  }
  h1{
    margin:0 0 4px;
    font-size:22px;
    letter-spacing:2px;
    color:var(--blood);
    text-shadow:0 0 16px rgba(255,44,60,0.65), 0 0 3px rgba(255,44,60,0.9);
    text-transform:uppercase;
  }
  .sub{
    margin:0 0 20px;
    font-size:13px;
    color:#c99a97;
  }
  .key-box{
    background:rgba(0,0,0,0.45);
    border:1px solid rgba(255,122,26,0.25);
    border-radius:6px;
    padding:16px;
    font-size:22px;
    font-weight:700;
    letter-spacing:2px;
    margin-bottom:20px;
    word-break:break-all;
    color: var(--ember);
    text-shadow: 0 0 10px rgba(255,122,26,0.5);
  }
  .copy-btn{
    background: linear-gradient(135deg, var(--blood), var(--blood-dim));
    color:#fff0ee;
    border:none;
    padding:12px 28px;
    border-radius:6px;
    font-weight:700;
    font-size:14px;
    letter-spacing:1px;
    text-transform:uppercase;
    cursor:pointer;
    transition:.2s ease;
    box-shadow:0 0 20px rgba(255,44,60,0.4);
  }
  .copy-btn:hover{ filter:brightness(1.15); transform:translateY(-1px); }
  .copy-btn:active{ transform:translateY(0); }
  .footer{
    margin-top:18px;
    font-size:12px;
    color:#a9807c;
    letter-spacing:0.3px;
  }
</style>
</head>
<body>

<div id="space"></div>
<canvas id="stars"></canvas>

<div class="orb o1"></div>
<div class="orb o2"></div>
<div class="orb o3"></div>

<div class="wrap">
  <div class="card">
    <h1>TGL_SCRIPTER</h1>
    <p class="sub">Your key, forged for you:</p>
    <div class="key-box" id="key-display">Generating...</div>
    <button class="copy-btn" onclick="copyKey()">Copy Key</button>
    <div class="footer">Key is valid for 24 hours from generation</div>
  </div>
</div>

<script>
  // ---- starfield ----
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let w, h, stars = [];

  function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function initStars(){
    stars = [];
    const count = Math.floor((w*h)/9000);
    for(let i=0;i<count;i++){
      stars.push({
        x: Math.random()*w,
        y: Math.random()*h,
        r: Math.random()*1.8 + 0.6,
        vx: (Math.random()-0.5)*0.25,
        vy: (Math.random()-0.5)*0.25,
        hue: Math.random() < 0.5 ? '255,44,60' : '255,122,26'
      });
    }
  }
  initStars();
  window.addEventListener('resize', initStars);

  const LINK_DIST = 130;

  function drawStars(){
    ctx.clearRect(0,0,w,h);
    for(const s of stars){
      s.x += s.vx; s.y += s.vy;
      if(s.x < 0 || s.x > w) s.vx *= -1;
      if(s.y < 0 || s.y > h) s.vy *= -1;
      ctx.beginPath();
      ctx.fillStyle = `rgba(${s.hue},0.85)`;
      ctx.shadowColor = `rgba(${s.hue},0.9)`;
      ctx.shadowBlur = 6;
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
    for(let i=0;i<stars.length;i++){
      for(let j=i+1;j<stars.length;j++){
        const a=stars[i], b=stars[j];
        const dx=a.x-b.x, dy=a.y-b.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<LINK_DIST){
          const alpha=(1-dist/LINK_DIST)*0.18;
          ctx.strokeStyle=`rgba(255,90,60,${alpha.toFixed(3)})`;
          ctx.lineWidth=1;
          ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
        }
      }
    }
    requestAnimationFrame(drawStars);
  }
  drawStars();

  // ---- key system (FINAL MATH FIX) ----
  const urlParams = new URLSearchParams(window.location.search);
  let rawHwid = urlParams.get('hwid') || "GUEST";
  let hwid = rawHwid.replace(/[^a-zA-Z0-9]/g, "").toUpperCase();

  function generateKey(id, offset = 0) {
    const now = new Date();
    const utcTime = now.getTime() + (offset * 86400000);
    const d = new Date(utcTime);
    
    const day = d.getUTCDate();
    const month = d.getUTCMonth() + 1;
    const year = d.getUTCFullYear();
    const salt = "TGL_ULTIMATE_SECURITY_99";

    // EXACT MATCH with Lua seed construction
    const seed = "DAY:" + day + "|MON:" + month + "|YR:" + year + "|ID:" + id + "|SALT:" + salt;
    
    // FINAL MATH SYNC: Lua uses 32-bit signed integers for this math
    let hash = 0;
    for (let i = 0; i < seed.length; i++) {
        // Force 32-bit integer math using bitwise operators
        hash = (((hash << 5) - hash) + seed.charCodeAt(i)) | 0;
        hash = hash % 9999999;
    }
    return "TGL-" + Math.abs(hash);
  }

  const key = generateKey(hwid, 0);
  document.getElementById("key-display").innerText = key;

  function copyKey() {
    navigator.clipboard.writeText(key).then(() => {
      alert("Key copied to clipboard!");
    });
  }
</script>
</body>
</html>
