<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TGL_SCRIPTER Key System</title>
<style>
  :root{
    --blood: #ff2c3c;
    --ember: #ff7a1a;
    --blood-dim: #8c0f18;
    --ink: #ffe9e5;
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0; height:100%; overflow:hidden;
    background:#050203;
    font-family:'Segoe UI', sans-serif;
    color: var(--ink);
  }

  #space{
    position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(circle at 15% 20%, rgba(180,20,30,0.35), transparent 45%),
      radial-gradient(circle at 85% 25%, rgba(255,120,20,0.16), transparent 45%),
      radial-gradient(circle at 50% 85%, rgba(120,0,10,0.35), transparent 50%),
      linear-gradient(160deg, #0a0303 0%, #150404 45%, #060202 100%);
    background-size: 200% 200%;
    animation: bgShift 22s ease-in-out infinite;
  }
  @keyframes bgShift{
    0%{ background-position: 0% 0%; }
    50%{ background-position: 100% 60%; }
    100%{ background-position: 0% 0%; }
  }

  canvas#stars{ position:fixed; inset:0; z-index:1; }

  .orb{
    position:fixed; border-radius:50%; z-index:1;
    filter: blur(2px);
    animation: orbFloat linear infinite;
    mix-blend-mode: screen;
  }
  .orb.o1{
    width:260px; height:260px; top:-6%; left:-8%;
    background: radial-gradient(circle, rgba(220,20,30,0.45), transparent 70%);
    animation-duration: 26s;
  }
  .orb.o2{
    width:220px; height:220px; bottom:-8%; right:-6%;
    background: radial-gradient(circle, rgba(255,122,26,0.30), transparent 70%);
    animation-duration: 34s;
    animation-direction: reverse;
  }
  .orb.o3{
    width:180px; height:180px; top:55%; left:60%;
    background: radial-gradient(circle, rgba(140,0,20,0.40), transparent 70%);
    animation-duration: 20s;
  }
  @keyframes orbFloat{
    0%{ transform: translate(0,0) scale(1); }
    50%{ transform: translate(30px,-25px) scale(1.08); }
    100%{ transform: translate(0,0) scale(1); }
  }

  .wrap{
    position:relative; z-index:5;
    height:100vh; display:flex; align-items:center; justify-content:center;
  }
  .card{
    position:relative;
    width:min(90vw, 380px);
    background: linear-gradient(180deg, rgba(20,6,7,0.75), rgba(10,3,4,0.75));
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius:6px;
    border:1px solid rgba(255,44,60,0.45);
    box-shadow: 0 0 50px rgba(255,44,60,0.18), 0 20px 60px rgba(0,0,0,0.6), inset 0 0 30px rgba(255,44,60,0.05);
    padding:34px 28px;
    text-align:center;
    clip-path: polygon(14px 0, 100% 0, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0 100%, 0 14px);
  }
  .card::before{
    content:'';
    position:absolute; inset:0;
    border-radius:6px;
    padding:1px;
    background: linear-gradient(135deg, rgba(255,122,26,0.6), transparent 40%, rgba(255,44,60,0.6));
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events:none;
  }
  h1{
    margin:0 0 4px;
    font-size:22px;
    letter-spacing:2px;
    color:var(--blood);
    text-shadow:0 0 16px rgba(255,44,60,0.65), 0 0 3px rgba(255,44,60,0.9);
    text-transform:uppercase;
  }
  .sub{
    margin:0 0 20px;
    font-size:13px;
    color:#c99a97;
  }
  .hwid-input{
    width:100%;
    background:rgba(0,0,0,0.45);
    border:1px solid rgba(255,44,60,0.45);
    border-radius:6px;
    padding:12px;
    color:#fff;
    margin-bottom:20px;
    font-size:16px;
    text-align:center;
    font-family: monospace;
    outline: none;
    transition: 0.3s;
    display: none;
  }
  .key-box{
    background:rgba(0,0,0,0.45);
    border:1px solid rgba(255,122,26,0.25);
    border-radius:6px;
    padding:16px;
    font-size:22px;
    font-weight:700;
    letter-spacing:2px;
    margin-bottom:20px;
    word-break:break-all;
    color: var(--ember);
    text-shadow: 0 0 10px rgba(255,122,26,0.5);
  }
  .copy-btn{
    background: linear-gradient(135deg, var(--blood), var(--blood-dim));
    color:#fff0ee;
    border:none;
    padding:12px 28px;
    border-radius:6px;
    font-weight:700;
    font-size:14px;
    letter-spacing:1px;
    text-transform:uppercase;
    cursor:pointer;
    transition:.2s ease;
    box-shadow:0 0 20px rgba(255,44,60,0.4);
  }
  .copy-btn:hover{ filter:brightness(1.15); transform:translateY(-1px); }
  .copy-btn:active{ transform:translateY(0); }
  .btn-row{
    display:flex; gap:10px; justify-content:center; flex-wrap:wrap;
    margin-top:14px;
  }
  .mini-btn{
    background: rgba(255,255,255,0.06);
    border:1px solid rgba(255,122,26,0.4);
    color: var(--ink);
    padding:9px 16px;
    border-radius:6px;
    font-weight:600;
    font-size:12px;
    letter-spacing:0.5px;
    text-transform:uppercase;
    cursor:pointer;
    transition:.2s ease;
    display:none;
  }
  .mini-btn:hover{ filter:brightness(1.2); }
  .time-text{
    margin-top:12px;
    font-size:13px;
    color: var(--ember);
    letter-spacing:0.5px;
    font-family: monospace;
  }
  .footer{
    margin-top:18px;
    font-size:12px;
    color:#a9807c;
    letter-spacing:0.3px;
  }
</style>
</head>
<body>

<div id="space"></div>
<canvas id="stars"></canvas>

<div class="orb o1"></div>
<div class="orb o2"></div>
<div class="orb o3"></div>

<div class="wrap">
  <div class="card" id="main-card">
    <h1>TGL_SCRIPTER</h1>
    <p class="sub" id="status-text">Verifying Device...</p>
    <input type="text" id="hwid-field" class="hwid-input" placeholder="Paste ID from Loader..." oninput="onManualIdInput()">
    <button class="mini-btn" id="copy-id-btn" onclick="copyDeviceId()">Copy Device ID</button>
    <div class="key-box" id="key-display">--- --- ---</div>
    <button class="copy-btn" id="copy-btn" onclick="copyKey()" style="display:none;">Copy Key</button>
    <div class="time-text" id="time-remaining"></div>
    <div class="btn-row">
      <button class="mini-btn" id="extend-btn" onclick="extendTime()">+6 Hours (Redo Task)</button>
      <button class="mini-btn" id="renew-btn" onclick="renewKey()">Get New Key</button>
    </div>
    <div class="footer" id="footer-text">Base key is valid 12 hours from generation. Complete the task again anytime to add 6 more hours.</div>
  </div>
</div>

<script>
  // ---- starfield ----
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let w, h, stars = [];

  function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function initStars(){
    stars = [];
    const count = Math.floor((w*h)/9000);
    for(let i=0;i<count;i++){
      stars.push({
        x: Math.random()*w,
        y: Math.random()*h,
        r: Math.random()*1.8 + 0.6,
        vx: (Math.random()-0.5)*0.25,
        vy: (Math.random()-0.5)*0.25,
        hue: Math.random() < 0.5 ? '255,44,60' : '255,122,26'
      });
    }
  }
  initStars();
  window.addEventListener('resize', initStars);

  const LINK_DIST = 130;

  function drawStars(){
    ctx.clearRect(0,0,w,h);
    for(const s of stars){
      s.x += s.vx; s.y += s.vy;
      if(s.x < 0 || s.x > w) s.vx *= -1;
      if(s.y < 0 || s.y > h) s.vy *= -1;
      ctx.beginPath();
      ctx.fillStyle = `rgba(${s.hue},0.85)`;
      ctx.shadowColor = `rgba(${s.hue},0.9)`;
      ctx.shadowBlur = 6;
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
    for(let i=0;i<stars.length;i++){
      for(let j=i+1;j<stars.length;j++){
        const a=stars[i], b=stars[j];
        const dx=a.x-b.x, dy=a.y-b.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<LINK_DIST){
          const alpha=(1-dist/LINK_DIST)*0.18;
          ctx.strokeStyle=`rgba(255,90,60,${alpha.toFixed(3)})`;
          ctx.lineWidth=1;
          ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
        }
      }
    }
    requestAnimationFrame(drawStars);
  }
  drawStars();

  // ---- key system (MAGIC REDIRECT MEMORY + EXTENDABLE TIME) ----
  const LINKVERT_URL = "https://link-hub.net/7154366/sLOEns8M50tJ";
  const urlParams = new URLSearchParams(window.location.search);
  const hash = window.location.hash.substring(1);

  const field     = document.getElementById("hwid-field");
  const status    = document.getElementById("status-text");
  const copyBtn   = document.getElementById("copy-btn");
  const copyIdBtn = document.getElementById("copy-id-btn");
  const extendBtn = document.getElementById("extend-btn");
  const renewBtn  = document.getElementById("renew-btn");
  const timeText  = document.getElementById("time-remaining");
  const keyBox    = document.getElementById("key-display");

  const BASE_VALID_SECONDS = 12 * 60 * 60; // 12 hour base window
  const BONUS_SECONDS      = 6  * 60 * 60; // +6 hours per completed extension
  const SALT = "TGL_ULTIMATE_SECURITY_99";

  let countdownTimer = null;

  function hashSeed(seed) {
    let hash = 0;
    for (let i = 0; i < seed.length; i++) {
        hash = (hash + seed.charCodeAt(i)) | 0;
        hash = (hash * 3) | 0;
        hash = Math.abs(hash % 9999999);
    }
    return hash;
  }

  // Key format: TGL-<hash>-<ts36>-<bonus36>
  // ts    = unix seconds when this key's base 12h period started
  // bonus = cumulative extra seconds from "+6 Hours" extensions
  // The hash covers ts AND bonus, so neither can be hand-edited to fake
  // more time without knowing the salt (same trust model as the base key).
  function generateKey(id, ts, bonus) {
    const cleanId = id.replace(/[^a-zA-Z0-9]/g, "").toUpperCase();
    const seed = "TS:" + ts + "|ID:" + cleanId + "|BONUS:" + bonus + "|SALT:" + SALT;
    return "TGL-" + hashSeed(seed) + "-" + ts.toString(36) + "-" + bonus.toString(36);
  }

  function loadState() {
    try { return JSON.parse(localStorage.getItem("TGL_KEY_STATE") || "null"); }
    catch (e) { return null; }
  }
  function saveState(state) {
    localStorage.setItem("TGL_KEY_STATE", JSON.stringify(state));
  }
  function remainingFor(state, now) {
    return (state.ts + BASE_VALID_SECONDS + state.bonus) - now;
  }

  function formatHMS(totalSeconds) {
    const s = Math.max(0, Math.floor(totalSeconds));
    const h = String(Math.floor(s / 3600)).padStart(2, '0');
    const m = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
    const sec = String(s % 60).padStart(2, '0');
    return h + ":" + m + ":" + sec;
  }

  function tickUI(state) {
    const now = Math.floor(Date.now() / 1000);
    const rem = remainingFor(state, now);
    if (rem <= 0) {
      timeText.innerText = "Key expired";
      extendBtn.style.display = "none";
      renewBtn.style.display = "inline-block";
      copyBtn.style.display = "none";
      if (countdownTimer) clearInterval(countdownTimer);
    } else {
      timeText.innerText = "Time left: " + formatHMS(rem);
      extendBtn.style.display = "inline-block";
      renewBtn.style.display = "none";
      copyBtn.style.display = "inline-block";
    }
  }

  function renderFromState(state) {
    keyBox.innerText = generateKey(state.id, state.ts, state.bonus);
    status.innerText = "Key generated for your device:";
    if (countdownTimer) clearInterval(countdownTimer);
    tickUI(state);
    countdownTimer = setInterval(() => tickUI(state), 1000);
  }

  function getOrCreateStateFor(hwid) {
    const now = Math.floor(Date.now() / 1000);
    let state = loadState();
    const stillValid = state && state.id === hwid && remainingFor(state, now) > 0;
    if (!stillValid) {
      state = { id: hwid, ts: now, bonus: 0 };
      saveState(state);
    }
    return state;
  }

  function extendTime() {
    const state = loadState();
    const now = Math.floor(Date.now() / 1000);
    if (!state || remainingFor(state, now) <= 0) return; // must renew instead
    localStorage.setItem("TGL_EXT_PENDING", "1");
    status.innerText = "Redirecting — complete the task again for +6 hours...";
    setTimeout(() => { window.location.href = LINKVERT_URL; }, 600);
  }

  function renewKey() {
    const hwid = field.value || localStorage.getItem("TGL_HWID");
    if (!hwid || hwid.length <= 5) return;
    const now = Math.floor(Date.now() / 1000);
    const state = { id: hwid, ts: now, bonus: 0 };
    saveState(state);
    renderFromState(state);
  }

  function copyKey() {
    navigator.clipboard.writeText(keyBox.innerText).then(() => {
      alert("Key copied to clipboard!");
    });
  }

  function copyDeviceId() {
    const val = field.value.trim();
    if (val.length > 5) {
      navigator.clipboard.writeText(val).then(() => {
        copyIdBtn.innerText = "ID Copied!";
        setTimeout(() => { copyIdBtn.innerText = "Copy Device ID"; }, 1200);
      });
    }
  }

  // Manual fallback entry: self-heals localStorage (so future visits/
  // extensions auto-detect even if the automated SAVE: hop failed) and
  // immediately generates/loads this device's key state.
  function onManualIdInput() {
    const val = field.value.trim();
    if (val.length > 5) {
      localStorage.setItem("TGL_HWID", val);
      const state = getOrCreateStateFor(val);
      renderFromState(state);
    }
  }

  // ---------------- BOOT SEQUENCE ----------------
  if (hash.startsWith("SAVE:")) {
      // First-ever visit from the loader: store HWID, then go do the task.
      const idToSave = hash.split(":")[1];
      if (idToSave) {
          localStorage.setItem("TGL_HWID", idToSave);
          status.innerText = "Device Registered. Redirecting...";
          setTimeout(() => { window.location.href = LINKVERT_URL; }, 800);
      }
  } else if (localStorage.getItem("TGL_EXT_PENDING") === "1") {
      // Returning from Linkvertise after clicking "+6 Hours".
      localStorage.removeItem("TGL_EXT_PENDING");
      let state = loadState();
      if (state) {
          state.bonus = (state.bonus || 0) + BONUS_SECONDS;
          saveState(state);
          status.innerText = "+6 hours added!";
          field.style.display = "none";
          copyIdBtn.style.display = "none";
          renderFromState(state);
      } else {
          field.style.display = "block";
          copyIdBtn.style.display = "inline-block";
          status.innerText = "Session lost — paste Device ID from Loader below:";
      }
  } else {
      // Normal load: try URL param, hash, or saved HWID.
      let hwid = urlParams.get('hwid') || hash || localStorage.getItem("TGL_HWID");
      if (hwid && hwid.length > 5) {
          field.value = hwid;
          field.style.display = "none";
          copyIdBtn.style.display = "none";
          const state = getOrCreateStateFor(hwid);
          renderFromState(state);
      } else {
          field.style.display = "block";
          copyIdBtn.style.display = "inline-block";
          status.innerText = "Paste Device ID from Loader below:";
      }
  }
</script>
</body>
</html>
