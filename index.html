<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TGL_SCRIPTER Key System</title>
<style>
  :root{ --blood: #ff2c3c; --ember: #ff7a1a; --blood-dim: #8c0f18; --ink: #ffe9e5; }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; height:100%; overflow:hidden; background:#050203; font-family:'Segoe UI', sans-serif; color: var(--ink); }
  
  /* STARFIELD & ORBS */
  #space{ position:fixed; inset:0; z-index:0; background: radial-gradient(circle at 15% 20%, rgba(180,20,30,0.35), transparent 45%), radial-gradient(circle at 85% 25%, rgba(255,120,20,0.16), transparent 45%), radial-gradient(circle at 50% 85%, rgba(120,0,10,0.35), transparent 50%), linear-gradient(160deg, #0a0303 0%, #150404 45%, #060202 100%); background-size: 200% 200%; animation: bgShift 22s ease-in-out infinite; }
  @keyframes bgShift{ 0%{ background-position: 0% 0%; } 50%{ background-position: 100% 60%; } 100%{ background-position: 0% 0%; } }
  canvas#stars{ position:fixed; inset:0; z-index:1; }
  .orb{ position:fixed; border-radius:50%; z-index:1; filter: blur(2px); animation: orbFloat linear infinite; mix-blend-mode: screen; }
  .orb.o1{ width:260px; height:260px; top:-6%; left:-8%; background: radial-gradient(circle, rgba(220,20,30,0.45), transparent 70%); animation-duration: 26s; }
  .orb.o2{ width:220px; height:220px; bottom:-8%; right:-6%; background: radial-gradient(circle, rgba(255,122,26,0.30), transparent 70%); animation-duration: 34s; animation-direction: reverse; }
  .orb.o3{ width:180px; height:180px; top:55%; left:60%; background: radial-gradient(circle, rgba(140,0,20,0.40), transparent 70%); animation-duration: 20s; }
  @keyframes orbFloat{ 0%{ transform: translate(0,0) scale(1); } 50%{ transform: translate(30px,-25px) scale(1.08); } 100%{ transform: translate(0,0) scale(1); } }

  .wrap{ position:relative; z-index:5; height:100vh; display:flex; align-items:center; justify-content:center; }
  .card{ position:relative; width:min(90vw, 380px); background: linear-gradient(180deg, rgba(20,6,7,0.75), rgba(10,3,4,0.75)); backdrop-filter: blur(14px); border-radius:6px; border:1px solid rgba(255,44,60,0.45); padding:34px 28px; text-align:center; box-shadow: 0 0 50px rgba(255,44,60,0.18); }
  h1{ margin:0; font-size:22px; letter-spacing:2px; color:var(--blood); text-transform:uppercase; text-shadow:0 0 16px rgba(255,44,60,0.65); }
  .sub{ margin:10px 0 20px; font-size:13px; color:#c99a97; }
  .hwid-input{ width:100%; background:rgba(0,0,0,0.45); border:1px solid rgba(255,44,60,0.45); border-radius:6px; padding:12px; color:#fff; font-size:16px; text-align:center; font-family: monospace; outline: none; }
  .get-id-link { display: block; text-align: right; color: var(--ember); font-size: 11px; text-decoration: none; margin-top: 5px; cursor: pointer; }
  .key-box{ background:rgba(0,0,0,0.45); border:1px solid rgba(255,122,26,0.25); border-radius:6px; padding:16px; font-size:22px; font-weight:700; margin: 20px 0; color: var(--ember); display: none; text-shadow: 0 0 10px rgba(255,122,26,0.5); }
  .action-btn{ background: linear-gradient(135deg, var(--blood), var(--blood-dim)); color:#fff; border:none; padding:12px; border-radius:6px; font-weight:700; cursor:pointer; width: 100%; text-transform:uppercase; margin-top: 10px; box-shadow:0 0 20px rgba(255,44,60,0.4); }
  .copy-btn { background: #222; display: none; }
  .note { margin-top: 20px; font-size: 11px; color: #a9807c; line-height: 1.4; text-align: center; }
</style>
</head>
<body>
<div id="space"></div>
<canvas id="stars"></canvas>
<div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
<div class="wrap">
  <div class="card">
    <h1>TGL_SCRIPTER</h1>
    <p class="sub">Enter Key System</p>
    <input type="text" id="hwid-field" class="hwid-input" placeholder="Paste Device ID here...">
    <a class="get-id-link" onclick="alert('Copy your Device ID from the in-game Loader.')">Click to get your device id</a>
    <button class="action-btn" id="get-key-btn" onclick="handleGetKey()">Get Key</button>
    <div class="key-box" id="key-display">--- --- ---</div>
    <button class="action-btn copy-btn" id="copy-btn" onclick="copyKey()">Copy Key</button>
    <div class="note">If the Key don't work copy the id and paste it in the key system.</div>
  </div>
</div>
<script>
  // STARFIELD ANIMATION
  const canvas = document.getElementById('stars'); const ctx = canvas.getContext('2d');
  let w, h, stars = [];
  function resize(){ w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize); resize();
  function initStars(){
    stars = []; const count = Math.floor((w*h)/9000);
    for(let i=0;i<count;i++){ stars.push({ x: Math.random()*w, y: Math.random()*h, r: Math.random()*1.8 + 0.6, vx: (Math.random()-0.5)*0.25, vy: (Math.random()-0.5)*0.25, hue: Math.random() < 0.5 ? '255,44,60' : '255,122,26' }); }
  }
  initStars();
  function drawStars(){
    ctx.clearRect(0,0,w,h);
    for(const s of stars){
      s.x += s.vx; s.y += s.vy; if(s.x < 0 || s.x > w) s.vx *= -1; if(s.y < 0 || s.y > h) s.vy *= -1;
      ctx.beginPath(); ctx.fillStyle = `rgba(${s.hue},0.85)`; ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
    }
    requestAnimationFrame(drawStars);
  }
  drawStars();

  // KEY SYSTEM
  function generateKey(id, offset = 0) {
    const d = new Date(new Date().getTime() + (offset * 86400000));
    const seed = "DAY:" + d.getUTCDate() + "|MON:" + (d.getUTCMonth() + 1) + "|YR:" + d.getUTCFullYear() + "|ID:" + id.replace(/[^a-zA-Z0-9]/g, "").toUpperCase() + "|SALT:TGL_ULTIMATE_SECURITY_99";
    let hash = 0; for (let i = 0; i < seed.length; i++) { hash = (hash + seed.charCodeAt(i)) | 0; hash = (hash * 3) | 0; hash = Math.abs(hash % 9999999); }
    return "TGL-" + hash;
  }
  function handleGetKey() {
    const val = document.getElementById("hwid-field").value.trim();
    if(val.length > 5) {
      document.getElementById("key-display").innerText = generateKey(val, 0);
      document.getElementById("key-display").style.display = "block";
      document.getElementById("copy-btn").style.display = "block";
    } else { alert("Enter a valid Device ID!"); }
  }
  function copyKey() { navigator.clipboard.writeText(document.getElementById("key-display").innerText).then(() => alert("Key Copied!")); }
</script>
</body>
</html>
