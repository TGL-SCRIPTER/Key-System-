<!DOCTYPE html>
<html>
<head>
    <title>TGL_SCRIPTER Key System</title>
    <style>
        body { background: #0f0f14; color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1a1a24; padding: 30px; border-radius: 12px; border: 2px solid #32cd32; text-align: center; box-shadow: 0 0 20px rgba(50, 205, 50, 0.3); }
        h1 { margin-top: 0; color: #32cd32; text-shadow: 0 0 10px rgba(50, 205, 50, 0.5); }
        .key-box { background: #0f0f14; padding: 15px; border-radius: 8px; font-size: 24px; font-weight: bold; margin: 20px 0; border: 1px solid #333; letter-spacing: 2px; }
        .copy-btn { background: #32cd32; color: #000; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .copy-btn:hover { background: #28a428; transform: scale(1.05); }
        .footer { margin-top: 20px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="card">
        <h1>TGL_SCRIPTER</h1>
        <p>Your Unique Daily Key is:</p>
        <div class="key-box" id="key-display">Generating...</div>
        <button class="copy-btn" onclick="copyKey()">Copy Key</button>
        <div class="footer">Key expires in 24 hours.</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const hwid = urlParams.get('hwid') || "GUEST";
        const salt = "TGL_ULTIMATE_SECURITY_99";

        function generateKey(hwid) {
            const date = new Date();
            const seed = date.getUTCDate() + "" + (date.getUTCMonth() + 1) + "" + date.getUTCFullYear() + hwid + salt;
            let hash = 0;
            for (let i = 0; i < seed.length; i++) {
                hash = (hash * 31 + seed.charCodeAt(i)) % 9999999;
            }
            return "TGL-" + Math.abs(hash);
        }

        const key = generateKey(hwid);
        document.getElementById("key-display").innerText = key;

        function copyKey() {
            navigator.clipboard.writeText(key);
            alert("Key copied to clipboard!");
        }
    </script>
</body>
</html>
